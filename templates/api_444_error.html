.glitch {
    position: relative;
}
.glitch::before,
.glitch::after {
    content: attr(data-text);
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}
.glitch::before {
    left: 2px;
    text-shadow: -2px 0 #49fc00;
    clip: rect(24px, 550px, 90px, 0);
    animation: glitch-anim-2 3s infinite linear alternate-reverse;
}
.glitch::after {
    left: -2px;
    text-shadow: -2px 0 #b300fc;
    clip: rect(85px, 550px, 140px, 0);
    animation: glitch-anim 2.5s infinite linear alternate-reverse;
}

<div class="container">
    <ul class="nav-links">
      <li><a href="{% url 'main:index' %}">Aller à l'accueil</a></li>
      <li><a href="javascript:history.back()">Précédent</a></li>
  </ul>

    <div class="error-icon">&#9888;</div>
    <h1 class="glitch" data-text="Erreur!">Erreur!</h1>

    <p>Désolé une erreur c'est produite!</p>
    <p>Veuillez reessayer ou Contactez-nous</p>
    <p></p>

    <div class="recommendation">
      <strong></strong>
      <a href="{% url 'main:index' %}#contact" class="btn" style="background-color:#0A21C0 ;">
          Contactez-nous
      </a>
  </div>
    
</div>

<script>
document.addEventListener('DOMContentLoaded', (event) => {
    const container = document.querySelector('.container');
    const errorIcon = document.querySelector('.error-icon');

    // Add a shake animation to the error icon
    errorIcon.addEventListener('mouseover', () => {
        errorIcon.style.animation = 'shake 0.82s cubic-bezier(.36,.07,.19,.97) both';
    });

    errorIcon.addEventListener('animationend', () => {
        errorIcon.style.animation = '';
    });

    // Create glitch effect on hover
    container.addEventListener('mousemove', (e) => {
        const x = e.pageX - container.offsetLeft;
        const y = e.pageY - container.offsetTop;
        
        const glitchElement = document.querySelector('.glitch');
        glitchElement.style.textShadow = `
            ${x / 100}px ${y / 100}px 0 rgba(255,0,0,.7),
            ${y / 100}px ${-x / 100}px 0 rgba(0,0,255,.7)
        `;
    });

    // Reset glitch effect
    container.addEventListener('mouseleave', () => {
        const glitchElement = document.querySelector('.glitch');
        glitchElement.style.textShadow = '';
    });
});

// Add a simple connection check
function checkConnection() {
    return navigator.onLine;
}

setInterval(() => {
    if (checkConnection()) {
        document.querySelector('.btn').style.backgroundColor = '#0A21C0 ';
        document.querySelector('.btn').textContent = 'Contactez-nous';
    } else {
        document.querySelector('.btn').style.backgroundColor = '#e74c3c';
        document.querySelector('.btn').textContent = 'No Connection';
    }
}, 1000);

// Add shake animation
const shake = `
@keyframes shake {
  10%, 90% { transform: translate3d(-1px, 0, 0); }
  20%, 80% { transform: translate3d(2px, 0, 0); }
  30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
  40%, 60% { transform: translate3d(4px, 0, 0); }
}`;

const styleSheet = document.createElement("style");
styleSheet.type = "text/css";
styleSheet.innerText = shake;
document.head.appendChild(styleSheet);
</script>
