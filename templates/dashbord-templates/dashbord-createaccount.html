<html><head><base href="https://websim.io/auth/register">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | WebSim</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>
<style>
  body {
    background: linear-gradient(135deg, #43cea2 0%, #185a9d 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .register-container {
    background-color: rgba(255, 255, 255, 0.9);
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
    overflow: hidden;
    width: 450px;
    max-width: 90%;
  }
  .register-header {
    background-color: #185a9d;
    color: white;
    padding: 20px;
    text-align: center;
    font-weight: bold;
  }
  .register-body {
    padding: 30px;
  }
  .form-control:focus {
    border-color: #185a9d;
    box-shadow: 0 0 0 0.2rem rgba(24, 90, 157, 0.25);
  }
  .btn-primary {
    background-color: #185a9d;
    border-color: #185a9d;
  }
  .btn-primary:hover {
    background-color: #134b82;
    border-color: #134b82;
  }
  .register-footer {
    background-color: #f8f9fa;
    border-top: 1px solid #e9ecef;
    padding: 15px;
    text-align: center;
    font-size: 0.9rem;
  }
  .input-group-text {
    background-color: #185a9d;
    color: white;
    border: none;
  }
  .password-strength {
    height: 5px;
    transition: width 0.5s ease-in-out;
  }
</style>
</head>
<body>
  <div class="register-container">
    <div class="register-header">
      <h2>Create Account</h2>
    </div>
    <div class="register-body">
      <form id="registerForm">
        <div class="mb-3">
          <div class="input-group">
            <span class="input-group-text">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-person" viewBox="0 0 16 16">
                <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0zm4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4zm-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10c-2.29 0-3.516.68-4.168 1.332-.678.678-.83 1.418-.832 1.664h10z"/>
              </svg>
            </span>
            <input type="text" class="form-control" id="username" placeholder="Username" required>
          </div>
        </div>
        <div class="mb-3">
          <div class="input-group">
            <span class="input-group-text">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-envelope" viewBox="0 0 16 16">
                <path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V4Zm2-1a1 1 0 0 0-1 1v.217l7 4.2 7-4.2V4a1 1 0 0 0-1-1H2Zm13 2.383-4.708 2.825L15 11.105V5.383Zm-.034 6.876-5.64-3.471L8 9.583l-1.326-.795-5.64 3.47A1 1 0 0 0 2 13h12a1 1 0 0 0 .966-.741ZM1 11.105l4.708-2.897L1 5.383v5.722Z"/>
              </svg>
            </span>
            <input type="email" class="form-control" id="email" placeholder="Email" required>
          </div>
        </div>
        <div class="mb-3">
          <div class="input-group">
            <span class="input-group-text">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-lock" viewBox="0 0 16 16">
                <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2zM5 8h6a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1z"/>
              </svg>
            </span>
            <input type="password" class="form-control" id="password" placeholder="Password" required>
          </div>
          <div class="password-strength mt-2"></div>
        </div>
        <div class="mb-3">
          <div class="input-group">
            <span class="input-group-text">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-lock-fill" viewBox="0 0 16 16">
                <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
              </svg>
            </span>
            <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm Password" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100">Create Account</button>
      </form>
    </div>
    <div class="register-footer">
      <p>Already have an account? <a href="https://websim.io/auth/">Login</a></p>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('registerForm');
      const inputs = form.querySelectorAll('input');
      const passwordInput = document.getElementById('password');
      const confirmPasswordInput = document.getElementById('confirmPassword');
      const passwordStrength = document.querySelector('.password-strength');

      gsap.from('.register-container', {
        duration: 1,
        y: 50,
        opacity: 0,
        ease: 'power3.out'
      });

      inputs.forEach(input => {
        input.addEventListener('focus', () => {
          gsap.to(input, {
            duration: 0.3,
            scale: 1.05,
            ease: 'power2.out'
          });
        });

        input.addEventListener('blur', () => {
          gsap.to(input, {
            duration: 0.3,
            scale: 1,
            ease: 'power2.out'
          });
        });
      });

      passwordInput.addEventListener('input', () => {
        const strength = calculatePasswordStrength(passwordInput.value);
        updatePasswordStrength(strength);
      });

      function calculatePasswordStrength(password) {
        let strength = 0;
        if (password.length >= 8) strength += 25;
        if (password.match(/[a-z]+/)) strength += 25;
        if (password.match(/[A-Z]+/)) strength += 25;
        if (password.match(/[0-9]+/)) strength += 25;
        return strength;
      }

      function updatePasswordStrength(strength) {
        passwordStrength.style.width = `${strength}%`;
        if (strength < 50) {
          passwordStrength.style.backgroundColor = '#dc3545';
        } else if (strength < 75) {
          passwordStrength.style.backgroundColor = '#ffc107';
        } else {
          passwordStrength.style.backgroundColor = '#28a745';
        }
      }

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = passwordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        if (password !== confirmPassword) {
          alert('Passwords do not match!');
          return;
        }

        // Here you would typically send the data to your server for account creation
        console.log('Registration attempt:', { username, email, password });

        // For demonstration purposes, we'll just show an alert
        alert('Account creation attempt received. In a real application, this would be processed securely on the server.');

        // Animate the form submission
        gsap.to(form, {
          duration: 0.5,
          scale: 0.95,
          opacity: 0.5,
          ease: 'power2.inOut',
          onComplete: () => {
            gsap.to(form, {
              duration: 0.5,
              scale: 1,
              opacity: 1,
              ease: 'power2.out'
            });
          }
        });
      });
    });
  </script>
</body></html>
